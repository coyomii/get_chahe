name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 1 * * *" # 每 5 分钟运行一次
    - cron: "0 8 * * *"
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      webhook_base_url: ${{ secrets.WEBHOOK_BASE_URL }}  # 注入 Secrets 到环境变量
      secret: ${{ secrets.SECRET }}
    steps:
      # 使用到的actions包(用于克隆当前仓库的所有代码)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Execute py script
        run: |
          python main.py

      - name: 列出所有文件
        run: |
          ls -l
      - name: Commit changes
        run: |
          git config --local user.email "2995265803@qq.com"
          git config --local user.name "coyomii"
          git add .
          git commit -m "Add changes" || echo "No changes to commit"
          git push origin main
